<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commande de produits - BE Clean</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f2f2f2;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #4CAF50;
  margin-bottom: 30px;
}

form {
  max-width: 1300px;
  margin: auto;
}

/* 🔹 Ligne principale */
.ligne-formulaire {
  display: flex;
  gap: 20px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 30px;
}

.form-group {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.form-group input,
.form-group select,
textarea {
  padding: 8px;
  font-size: 14px;
}

/* 🔹 Produits */
#produits {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.produit {
  background: white;
  padding: 10px;
  border-radius: 6px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.img-container {
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-container img {
  max-height: 100%;
  max-width: 100%;
}

.quantite-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 5px;
  gap: 5px;
}

.quantite-container button {
  padding: 5px 10px;
  cursor: pointer;
}

textarea {
  width: 100%;
  height: 90px;
  margin-top: 20px;
}

button[type="submit"] {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 16px;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

button[type="submit"]:hover {
  background: #43a047;
}
</style>
</head>

<body>

<h1>Commande de produits</h1>

<form id="formCommande">

<div class="ligne-formulaire">

  <div class="form-group">
    <label>Nom de la société :</label>
    <input type="text" value="BE Clean" readonly>
  </div>

  <div class="form-group">
    <label>Chantier :</label>
    <select id="chantier">
      <option value="">-- Sélectionner un chantier --</option>
    </select>
  </div>

  <div class="form-group">
    <label>Votre nom :</label>
    <input type="text" id="nom" placeholder="Votre nom">
  </div>

</div>

<div id="produits"></div>

<button type="submit">Envoyer la commande</button>

</form>

<script src="script.js"></script>

<script>
(function(){
  emailjs.init("UIMYUuF1YijZh1DFI"); // ⚠️ Remplace par ton vrai USER ID EmailJS
})();
</script>

</body>
</html>
